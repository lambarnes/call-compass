<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h2>Caption Bridge</h2>

    <div class="form-group">
      <label for="callId">Call ID:</label>
      <input type="text" id="callId" placeholder="UUID" class="input">
    </div>

    <div class="form-group">
      <label for="ingestToken">Ingest Token:</label>
      <input type="password" id="ingestToken" placeholder="64-char token" class="input">
    </div>

    <div class="form-group">
      <label for="backendUrl">Backend URL:</label>
      <input type="text" id="backendUrl" placeholder="https://your-domain.com" class="input">
    </div>

    <div class="button-group">
      <button id="startBtn" class="btn btn-primary">Start Capturing</button>
      <button id="stopBtn" class="btn btn-secondary" disabled>Stop Capturing</button>
    </div>

    <div id="status" class="status"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
